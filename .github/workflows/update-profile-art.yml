name: Update profile activity

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py

      - name: Render animated heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit refreshed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json assets/contrib-heatmap.svg
          if git diff --cached --quiet; then
            echo "No profile changes to commit."
          else
            git commit -m "chore: refresh profile activity [skip ci]"
            git push
          fi
